<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />

    <!-- START META PROPERTIES  -->

    <meta
      name="description"
      content="Freelance developer in Perak, Malaysia — web, mobile & systems."
    />

    <!-- Open Graph (WhatsApp / Facebook / LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ashraf Hamil — Freelance Developer" />
    <meta
      property="og:description"
      content="Freelance developer in Perak, Malaysia — web, mobile & systems."
    />
    <meta property="og:url" content="https://www.ashrafhamil.com/" />
    <meta
      property="og:image"
      content="https://www.ashrafhamil.com/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Ashraf Hamil" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ashraf Hamil — Freelance Developer" />
    <meta
      name="twitter:description"
      content="Freelance developer in Perak, Malaysia — web, mobile & systems."
    />
    <meta
      name="twitter:image"
      content="https://www.ashrafhamil.com/og-image.png"
    />

    <!-- END META PROPERTIES  -->

    <link rel="icon" href="<%= BASE_URL %>favicon.ico" />
    <title>Portfolio | Ashraf Hamil</title>

    <!-- BOOTSTRAP CSS  -->
    <link
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- FONT AWESOME  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- DEVICONS -->
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css"
    />

    <!-- FONTS  -->
    <link
      href="https://fonts.googleapis.com/css2?family=Karla:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Rubik&display=swap"
      rel="stylesheet"
    />

    <!-- AOS ANIMATION LIBRARY CSS  -->
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-W84KP2TJDC"
    ></script>

    <!-- AOS ANIMATION LIBRARY JS  -->
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>

    <!-- JQUERY  -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

    <!-- BOOTSTRAP & POPPER JS  -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-P5W7GPC"
        height="0"
        width="0"
        style="display:none;visibility:hidden"
      ></iframe
    ></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <noscript>
      <strong
        >We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work
        properly without JavaScript enabled. Please enable it to
        continue.</strong
      >
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>

  <script>
    AOS.init();
  </script>
</html>
